baseURL = 'https://carike.github.io/'
languageCode = 'en-us'
theme = 'terminal'
pagination.pagerSize = 5

[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  contentTypeName = "posts"
  showMenuItems = 6
  fullWidthTheme = false
  centerTheme = true
  showLastUpdated = false
  autoCover = true

[languages]
  [languages.en]
    title = "Carike Bosman"
    copyright = "© 2024 Carike Bosman"

    [languages.en.params]
      subtitle = "Software Engineer | Speaker | Community Builder"
      keywords = "software engineering, azure, devops, .net, community, speaker"
      menuMore = "Show more"
      readMore = "Read more"
      readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "carike@dev:~$"
      logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "blog"
        name = "Blog"
        url = "/posts"
        weight = 10
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
        weight = 20
      [[languages.en.menu.main]]
        identifier = "speaker"
        name = "Speaker"
        url = "/speaker"
        weight = 30
      [[languages.en.menu.main]]
        identifier = "community"
        name = "Community"
        url = "/community"
        weight = 40
      [[languages.en.menu.main]]
        identifier = "certifications"
        name = "Certifications"
        url = "/certifications"
        weight = 50
      [[languages.en.menu.main]]
        identifier = "socials"
        name = "Socials"
        url = "/socials"
        weight = 60
